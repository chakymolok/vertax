<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="VERTAX vinyl mark">
  <!-- LCD-style chassis tile -->
  <rect width="64" height="64" rx="12" fill="#0F1110"/>
  <!-- Vinyl outer edge -->
  <circle cx="32" cy="32" r="23" fill="#15171A" stroke="#2A2C2A" stroke-width="1"/>
  <!-- Grooves -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#1F2123" stroke-width="0.6" opacity="0.85"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#1F2123" stroke-width="0.6" opacity="0.7"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#1F2123" stroke-width="0.6" opacity="0.55"/>
  <!-- Lime center label (V for VERTAX) -->
  <circle cx="32" cy="32" r="10" fill="#C8FF2E"/>
  <!-- Spindle hole -->
  <circle cx="32" cy="32" r="1.6" fill="#0F1110"/>
  <!-- Subtle glow ring -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#C8FF2E" stroke-width="0.6" opacity="0.35"/>
</svg>
