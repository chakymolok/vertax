<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="VERTAX vinyl mark">
  <!-- iOS strips transparency to white, so keep a solid bg -->
  <rect width="180" height="180" rx="36" fill="#0F1110"/>
  <!-- Vinyl outer -->
  <circle cx="90" cy="90" r="66" fill="#15171A" stroke="#2A2C2A" stroke-width="2"/>
  <!-- Grooves -->
  <circle cx="90" cy="90" r="55" fill="none" stroke="#1F2123" stroke-width="1.4" opacity="0.85"/>
  <circle cx="90" cy="90" r="46" fill="none" stroke="#1F2123" stroke-width="1.4" opacity="0.7"/>
  <circle cx="90" cy="90" r="37" fill="none" stroke="#1F2123" stroke-width="1.4" opacity="0.55"/>
  <!-- Lime center -->
  <circle cx="90" cy="90" r="28" fill="#C8FF2E"/>
  <circle cx="90" cy="90" r="4.6" fill="#0F1110"/>
  <!-- Glow ring -->
  <circle cx="90" cy="90" r="28" fill="none" stroke="#C8FF2E" stroke-width="1.6" opacity="0.35"/>
</svg>
