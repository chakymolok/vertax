/* ============================================================ *//* CAMELOT HELPERS + SET GENERATION *//* ============================================================ */function camelotNeighbors(c){ if (!c) return []; var num = parseInt(c, 10); var letter = c.slice(-1); var nxt = num === 12 ? 1 : num + 1; var prv = num === 1 ? 12 : num - 1; return [c, nxt + letter, prv + letter, num + (letter === 'A' ? 'B' : 'A')]; } function isValidNext(prev, cand, mode, opts){ if (!prev) return true; if (prev.id === cand.id) return false; if (prev.recordId === cand.recordId) return false; /* VINYL RULE — applies to all modes */var tempo = (opts && opts.tempoRange) || 4; if (mode === 'tempo-safe') { if (!prev.bpm || !cand.bpm) return false; if (Math.abs(prev.bpm - cand.bpm) > tempo) return false; } else if (mode === 'camelot-safe') { if (!prev.camelot || !cand.camelot) return false; if (camelotNeighbors(prev.camelot).indexOf(cand.camelot) < 0) return false; if (prev.bpm && cand.bpm && Math.abs(prev.bpm - cand.bpm) > 6) return false; } else if (mode === 'best-flow') { /* Combines BPM + Camelot. Strict: needs BPM on both for transition; Camelot is a soft bonus */if (!prev.bpm || !cand.bpm) return false; if (Math.abs(prev.bpm - cand.bpm) > tempo) return false; /* If both have Camelot, require neighbour or same */if (prev.camelot && cand.camelot && camelotNeighbors(prev.camelot).indexOf(cand.camelot) < 0) return false; } else if (mode === 'camelot-filter') { /* Use only tracks whose camelot is in opts.camelotSet */var set = (opts && opts.camelotSet) || {}; if (!cand.camelot || !set[cand.camelot]) return false; if (prev.bpm && cand.bpm && Math.abs(prev.bpm - cand.bpm) > tempo) return false; } else if (mode === 'energy-flow') { if (prev.bpm && cand.bpm && Math.abs(prev.bpm - cand.bpm) > 10) return false; } else { /* vinyl-practical */if (prev.bpm && cand.bpm && Math.abs(prev.bpm - cand.bpm) > tempo) return false; } return true; } function scoreCandidate(prev, cand, mode, opts){ var scor ont-size:12px;line-height:1.6;">' + '<p><strong>1.</strong> «Добавить пластинку» → введи артиста и название → «→».</p>' + '<p><strong>2.</strong> Выбери своего кандидата из списка — подтянется треклист.</p>' + '<p><strong>3.</strong> Если нет хороших результатов — «Распознать по фото».</p>' + '<p><strong>4.</strong> Добавь до ' + SESSION_LIMIT + ' пластинок, нажми «Готово → треклисты».</p>' + '<p><strong>5.</strong> Проверь BPM/Key, собери сет.</p>' + '<p style="color:var(--text-tertiary);font-size:11px;">Если открыто как file://, часть API заблокируется CORS. Используй https-хост (Tilda) или локальный сервер.</p>' + '</div></div></div>'; } function renderConfirmClearModal(){ return '<div class="laiso-modal-bg" data-action="close-modal-bg"><div class="laiso-modal" data-stop>' + '<h2 class="laiso-modal-title">Точно стереть все данные?</h2>' + '<p>Удалит все пластинки, сеты и локальные настройки приложения. Действие необратимо.</p>' + '<div class="laiso-row" style="margin-top:16px;">' + '<button class="laiso-btn laiso-btn-secondary laiso-grow" data-action="close-modal">Отмена</button>' + '<button class="laiso-btn laiso-btn-warning laiso-grow" data-action="clear-data-confirm">Да, стереть всё</button>' + '</div>' + '</div></div>'; } function renderModal(){ if (state.modal === 'add-vinyl') return renderAddModal(); if (state.modal === 'manual-vinyl') return renderManualVinylModal(); if (state.modal === 'about') return renderAboutModal(); if (state.modal === 'help') return renderHelpModal(); if (state.modal === 'confirm-clear') return renderConfirmClearModal(); return ''; }

<script>
/* ---------- MATCH ---------- */function viewMatch(){ var cands = state.ui.candidates || []; var top = cands[0]; var rest = cands.slice(1, 3); if (!top) { return renderHeader('Подтверждение релиза') + '<div class="laiso-empty">Нет кандидатов.</div>' + '<div class="laiso-row" style="margin-top:16px;">' + '<button class="laiso-btn laiso-btn-secondary laiso-grow" data-action="back">Назад</button>' + '<button class="laiso-btn laiso-grow" data-action="match-manual">Ввести вручную</button>' + '</div>'; } var vinyl = findVinyl(state.ui.currentVinylId); var conf = vinyl ? vinyl.confidence : 75; function candSmall(c, idx){ return '<div class="laiso-vinyl-card" style="margin-top:8px;">' + '<div class="laiso-vinyl-cover">' + (c.coverUrl?'<img src="'+esc(c.coverUrl)+'" alt="">':'нет фото') + '</div>' + '<div class="laiso-vinyl-info">' + '<div class="laiso-vinyl-title">' + esc(c.title) + '</div>' + '<div class="laiso-vinyl-artist">' + esc(c.artist) + '</div>' + '<div class="laiso-vinyl-meta">' + esc(c.label||'') + (c.catno?' · '+esc(c.catno):'') + (c.year?' · '+esc(c.year):'') + '</div>' + '</div>' + '<div class="laiso-vinyl-actions">' + '<span class="laiso-match-pct">' + (conf - 15 - idx*5) + '%</span>' + '<button class="laiso-btn laiso-btn-sm laiso-btn-secondary" data-action="match-pick" data-idx="' + (idx+1) + '">Это моя</button>' + '</div>' + '</div>'; } var trackPreview = (top.tracklist || []).slice(0, 6).map(function(t){ return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;font-family:var(--font-mono);">' + '<span>' + esc(t.position) + ' · ' + esc(t.title) + '</span>' + '<span style="color:var(--text-tertiary);">' + esc(t.duration||'') + '</span>' + '</div>'; }).join(''); if ((top.tracklist || []).length > 6) trackPreview += '<div style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);text-transform:uppercase;">+' + (top.tracklist.length - 6) + ' ещё…</div>'; return renderHeader('Подтверждение релиза') + '<div class="laiso-stack">' + '<div class="laiso-match-top">' + '<div class="laiso-match-cover">' + (top.coverUrl?'<img src="'+esc(top.coverUrl)+'" alt="">':'') + '</div>' + '<div style="text-align:center;margin-bottom:8px;">' + '<span class="laiso-match-pct">СОВПАДЕНИЕ ' + conf + '%</span>' + '</div>' + '<div style="text-align:center;">' + '<div class="laiso-h1">' + esc(top.title) + '</div>' + '<div style="color:var(--text-secondary);margin-top:4px;">' + esc(top.artist) + '</div>' + '<div class="laiso-vinyl-meta" style="margin-top:6px;">' + esc(top.label||'') + (top.catno?' · '+esc(top.catno):'') + (top.year?' · '+esc(top.year):'') + (top.format?' · '+esc(top.format):'') + '</div>' + '</div>' + '<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px;">' + trackPreview + '</div>' + '<button class="laiso-btn laiso-btn-block" style="margin-top:16px;" data-action="match-pick" data-idx="0">Это моя пластинка</button>' + '</div>' + (rest.length ? '<div><div class="laiso-meta" style="margin-bottom:6px;">Другие кандидаты</div>' + rest.map(candSmall).join('') + '</div>' : '') + '<div class="laiso-row" style="margin-top:8px;">' + '<button class="laiso-btn laiso-btn-secondary laiso-grow" data-action="match-retake">Переснять</button>' + '<button class="laiso-btn laiso-btn-secondary laiso-grow" data-action="match-manual">Вручную</button>' + '<button class="laiso-btn laiso-btn-secondary laiso-grow" data-action="match-skip">Пропустить</button>' + '</div>' + '</div>'; } /* ---------- TRACKLIST ---------- */function viewTracklist(){ var v = findVinyl(state.ui.currentVinylId); if (!v) { return renderHeader('Треклист') + '<div class="laiso-empty">Пластинка не выбрана</div>'; } var sides = ['A','B','C','D','E','F']; var active = state.ui.activeSide; if (sides.indexOf(active) < 0) active = sides[0]; var tabs = '<div class="laiso-tabs">' + sides.map(function(s){ return '<button class="laiso-tab ' + (s===active?'active':'') + '" data-action="side-tab" data-side="' + s + '">сторона ' + s + '</button>'; }).join('') + '</div>'; function srcAbbrev(src){ if (src === 'getsongbpm') return { label:'GSB', color:'var(--accent-lime-dark)' }; if (src === 'acousticbrainz') return { label:'ACB', color:'#3a8fd8' }; if (src === 'manual') return { label:'РУЧ', color:'var(--text-tertiary)' }; return null; } var rows = (v.tracklist || []).filter(function(t){ return t.side === active; }).map(function(t){ var srcBadge = ''; var sa = srcAbbrev(t.bpmSource); if (sa && t.bpm) { srcBadge = '<span style="display:block;font-family:var(--font-mono);font-size:8px;color:' + sa.color + ';letter-spacing:0.04em;margin-top:1px;line-height:1;">' + sa.label + (t.halftimeCorrected ? ' <span style="color:var(--warning);">½×</span>' : '') + (t.conflict ? ' <span style="color:var(--warning);" title="Sources disagree">!</span>' : '') + '</span>'; } /* Mini ×2 / ÷2 button for DnB / drum'n'bass scenarios: *//* - if BPM exists in 70-100 range → show ×2 *//* - if originalBpm exists (already doubled) → show ÷2 (revert) */var x2Btn = ''; if (t.originalBpm && t.bpm) { x2Btn = '<button class="laiso-x2-btn" data-action="bpm-divide-2" data-vid="' + esc(v.id) + '" data-tid="' + esc(t.id) + '" title="вернуть ' + esc(String(t.originalBpm)) + '">÷2</button>'; } else if (t.bpm && t.bpm >= 60 && t.bpm <= 115) { x2Btn = '<button class="laiso-x2-btn" data-action="bpm-x2" data-vid="' + esc(v.id) + '" data-tid="' + esc(t.id) + '" title="DnB: удвоить BPM">×2</button>'; } var excludedClass = t.excludeFromSets ? ' is-excluded' : ''; return '<div class="laiso-track' + excludedClass + '" data-track-id="' + esc(t.id) + '">' + '<span class="laiso-track-pos">' + esc(t.position || '') + '</span>' + '<span class="laiso-track-title" data-action="edit-track" data-id="' + esc(t.id) + '">' + esc(t.title || '—') + (t.excludeFromSets?' <span style="color:var(--text-tertiary);font-size:10px;">[не в сете]</span>':'') + '</span>' + '<span class="laiso-track-bpm">' + (t.bpm ? '<span class="laiso-track-bpm-val">' + t.bpm + '</span>' : '—') + srcBadge + x2Btn + '<button class="laiso-x2-btn" data-action="edit-track" data-id="' + esc(t.id) + '" title="править вручную">править</button>' + '</span>' + '<span class="laiso-track-key">' + esc(t.key || '—') + '</span>' + '<span class="laiso-track-cam">' + esc(t.camelot || '—') + '</span>' + '<div class="laiso-menu" data-track-menu="' + esc(t.id) + '">' + '<button class="laiso-menu-btn" data-action="toggle-menu" data-id="trk-' + esc(t.id) + '">⋯</button>' + '<div class="laiso-menu-list">' + '<button data-action="edit-track" data-id="' + esc(t.id) + '">Править BPM/Key</button>' + '<button data-action="track-manual-meta" data-vid="' + esc(v.id) + '" data-tid="' + esc(t.id) + '">Ввести BPM/Key…</button>' + '<button data-action="track-toggle-exclude" data-vid="' + esc(v.id) + '" data-tid="' + esc(t.id) + '">' + (t.excludeFromSets?'Вернуть в сеты':'Не использовать в сете') + '</button>' + '<button data-action="rename-track" data-id="' + esc(t.id) + '">Переименовать</button>' + '<button data-action="change-side" data-id="' + esc(t.id) + '">Сменить сторону</button>' + '<button data-action="delete-track" data-id="' + esc(t.id) + '" class="danger">Удалить</button>' + '</div>' + '</div>' + '</div>'; }).join('') || '<div class="laiso-empty">На этой стороне треков нет</div>'; var listHtml = '<div class="laiso-panel" style="padding:0;overflow:hidden;">' + rows + '</div>'; return renderHeader('Треклист') + '<div class="laiso-panel">' + '<div class="laiso-h1">' + esc(v.title || '—') + '</div>' + '<div style="color:var(--text-secondary);margin-top:2px;">' + esc(v.artist || '—') + '</div>' + '<div class="laiso-vinyl-meta" style="margin-top:8px;">' + esc(v.label||'') + (v.catno?' · '+esc(v.catno):'') + (v.year?' · '+esc(v.year):'') + (v.format?' · '+esc(v.format):'') + '</div>' + '</div>' + tabs + '<div class="laiso-meta" style="display:flex;justify-content:space-between;padding:0 12px 6px;">' + '<span>ПОЗ</span><span style="margin-right:auto;margin-left:36px;">НАЗВАНИЕ</span>' + '<span style="margin-right:42px;">BPM</span><span style="margin-right:42px;">KEY</span>' + '<span class="laiso-track-cam">CAM</span><span style="width:24px;"></span>' + '</div>' + listHtml + '<div class="laiso-stack" style="margin-top:16px;">' + '<button class="laiso-btn laiso-btn-secondary laiso-btn-block" data-action="add-track-blank">+ Добавить трек</button>' + '<button class="laiso-btn laiso-btn-block" data-action="confirm-tracklist">Подтвердить треклист</button>' + '</div>'; } /* ---------- EDIT TRACK ---------- */function viewEditTrack(){ var v = findVinyl(state.ui.currentVinylId); var t = v && findTrack(v, state.ui.currentTrackId); if (!v || !t) return renderHeader('Править трек') + '<div class="laiso-empty">Трек не выбран</div>'; var keyOpts = '<option value="">— выбрать —</option>' + ALL_KEYS.map(function(k){ return '<option value="' + esc(k) + '"' + (t.key===k?' selected':'') + '>' + esc(k) + ' (' + KEY_TO_CAMELOT[k] + ')</option>'; }).join(''); var camOpts = '<option value="">— авто —</option>' + Object.keys(CAMELOT_TO_KEY).sort(function(a,b){ var na = parseInt(a,10), nb = parseInt(b,10); if (na !== nb) return na - nb; return a.slice(-1).localeCompare(b.slice(-1)); }).map(function(c){ return '<option value="' + c + '"' + (t.camelot===c?' selected':'') + '>' + c + ' (' + CAMELOT_TO_KEY[c] + ')</option>'; }).join(''); var conf = t.confidence === 'high' ? 5 : t.confidence === 'medium' ? 3 : t.confidence === 'low' ? 1 : 2; var confDots = ''; for (var i = 1; i <= 5; i++) confDots += '<span class="laiso-conf-dot ' + (i<=conf?'on':'') + '"></span>'; var bpmShow = t.bpm || '---'; var camShow = t.camelot || '--'; var keyShow = t.key || '--'; /* ×2 / ÷2 always available in 70-100 BPM range or when track is already doubled */var x2Btn = ''; if (t.originalBpm && t.bpm) { x2Btn = '<button class="laiso-btn laiso-btn-sm laiso-btn-secondary" data-action="bpm-divide-2" data-vid="' + esc(v.id) + '" data-tid="' + esc(t.id) + '">÷2 · вернуть ' <script>
(function(){
  'use strict';

  function boot(){
    if (!window.laisoBuck || !window.laisoBuck.state || !window.laisoBuck.render || typeof on !== 'function') {
      setTimeout(boot, 160);
      return;
    }
    if (window.__vertaxBackupPatchInstalled) return;
    window.__vertaxBackupPatchInstalled = true;

    window.STORE_VINYLS = window.STORE_VINYLS || 'vinyls';
    window.STORE_SETS = window.STORE_SETS || 'sets';
    window.STORE_SETTINGS = window.STORE_SETTINGS || 'settings';
    if (typeof window.dbDel !== 'function' && typeof dbDelete === 'function') window.dbDel = dbDelete;
    if (typeof window.dbClear !== 'function') {
      window.dbClear = function(storeName){
        return new Promise(function(resolve, reject){
          try {
            var tx = dbInstance.transaction(storeName, 'readwrite');
            tx.objectStore(storeName).clear();
            tx.oncomplete = function(){ resolve(); };
            tx.onerror = function(){ reject(tx.error); };
          } catch(e) {
            reject(e);
          }
        });
      };
    }

    var state = window.laisoBuck.state;

    function safeEsc(s){
      if (typeof esc === 'function') return esc(s);
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }
    function renderApp(){
      try {
        if (window.laisoBuck && typeof window.laisoBuck.render === 'function') window.laisoBuck.render();
        else if (typeof render === 'function') render();
      } catch(e) {
        console.warn('VERTAX backup render error', e);
      }
    }
    function toast(msg, ms){
      if (typeof showToast === 'function') showToast(msg, ms);
      else console.log(msg);
    }
    function storeVinyls(){ return window.STORE_VINYLS || 'vinyls'; }
    function storeSets(){ return window.STORE_SETS || 'sets'; }
    function storeSettings(){ return window.STORE_SETTINGS || 'settings'; }
    function pad(n){ return n < 10 ? '0' + n : String(n); }
    function formatDateTime(ts){
      if (!ts) return '';
      var d = new Date(Number(ts));
      if (isNaN(d.getTime())) return '';
      return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear() + ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function formatFileStamp(ts){
      var d = new Date(ts || Date.now());
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + '-' + pad(d.getHours()) + '-' + pad(d.getMinutes());
    }
    function norm(s){
      return String(s == null ? '' : s).toLowerCase().trim().replace(/\s+/g, ' ');
    }
    function settingValue(settings, key){
      var rec = (settings || []).find(function(x){ return x && x.key === key; });
      return rec ? rec.value : null;
    }
    async function loadSettings(){
      var settings = [];
      try { settings = await dbGetAll(storeSettings()); } catch(_) {}
      state.ui = state.ui || {};
      state.ui.backupSettings = settings || [];
      return state.ui.backupSettings;
    }
    async function putSetting(key, value){
      try { await dbPut(storeSettings(), { key:key, value:value }); } catch(e) { console.warn('backup setting error', e); }
      state.ui = state.ui || {};
      var arr = state.ui.backupSettings || [];
      var rec = arr.find(function(x){ return x && x.key === key; });
      if (rec) rec.value = value;
      else arr.push({ key:key, value:value });
      state.ui.backupSettings = arr;
    }
    async function openBackup(){
      state.ui = state.ui || {};
      state.ui.backupRestoreData = null;
      state.ui.backupRestoreError = null;
      await loadSettings();
      state.view = 'backup';
      state.modal = null;
      renderApp();
      setTimeout(function(){ try { window.scrollTo({ top:0, behavior:'smooth' }); } catch(_){} }, 60);
    }
    function uniqueById(list){
      var out = [], seen = {};
      (list || []).forEach(function(item){
        if (!item || !item.id || seen[item.id]) return;
        seen[item.id] = true;
        out.push(item);
      });
      return out;
    }
    function currentVinylCount(){
      return uniqueById((state.collection || [])).length;
    }
    function backupStatusHtml(){
      var settings = state.ui && state.ui.backupSettings || [];
      var lastAt = settingValue(settings, 'lastBackupAt');
      var lastCount = Number(settingValue(settings, 'lastBackupVinylCount') || 0);
      var currentCount = currentVinylCount();
      var added = lastAt ? Math.max(0, currentCount - lastCount) : 0;
      var status = lastAt ?
        '<strong>Последняя копия: ' + safeEsc(formatDateTime(lastAt)) + '</strong><span>Пластинок в той копии: ' + safeEsc(lastCount) + '</span>' :
        '<strong>Резервная копия: не создавалась</strong>';
      var warning = added > 0 ?
        '<div class="vertax-backup-warn">С последней копии добавлено: ' + safeEsc(added) + ' пластинок.<br>Рекомендуем сохранить новую копию.</div>' : '';
      return '<div class="vertax-backup-status">' + status + '</div>' + warning;
    }
    function shouldShowOnboarding(){
      var settings = state.ui && state.ui.backupSettings || [];
      return !settingValue(settings, 'lastBackupAt') && !settingValue(settings, 'backupOnboardingSeen');
    }
    function onboardingHtml(){
      if (!shouldShowOnboarding()) return '';
      return '<div class="vertax-backup-onboarding">' +
        '<div class="vertax-backup-lock">🔒</div>' +
        '<h2>Ваши данные — только ваши</h2>' +
        '<p>VERTAX не собирает и не хранит вашу коллекцию на серверах. Мы не знаем кто вы и что у вас в коллекции — и не хотим знать.</p>' +
        '<p>Обратная сторона: если браузер очистит данные или вы смените телефон — коллекция пропадёт.</p>' +
        '<p>Поэтому мы сделали резервную копию. Это файл который вы сохраняете сами — в Telegram себе, в заметки, в облако. Вы полностью контролируете где он хранится.</p>' +
        '<p><strong>Честно. Просто. Надёжно.</strong></p>' +
        '<button class="laiso-btn laiso-btn-block" data-action="backup-onboarding-done">Понятно, сохраню копию</button>' +
      '</div>';
    }
    function restoreChoiceHtml(){
      var data = state.ui && state.ui.backupRestoreData;
      if (!data) return '';
      var date = data.createdAt ? formatDateTime(data.createdAt).split(',')[0] : 'неизвестной даты';
      var count = Array.isArray(data.vinyls) ? data.vinyls.length : 0;
      return '<div class="vertax-backup-restore">' +
        '<strong>Найдена копия от ' + safeEsc(date) + '</strong>' +
        '<span>Пластинок в файле: ' + safeEsc(count) + '</span>' +
        '<p>Как восстановить коллекцию?</p>' +
        '<button class="laiso-btn laiso-btn-block" data-action="backup-restore-replace">Заменить текущую коллекцию</button>' +
        '<button class="laiso-btn laiso-btn-secondary laiso-btn-block" data-action="backup-restore-merge">Объединить с текущей</button>' +
        '<button class="laiso-btn laiso-btn-secondary laiso-btn-block" data-action="backup-restore-cancel">Отмена</button>' +
      '</div>';
    }
    function viewBackup(){
      return renderHeader('Резервная копия') +
        '<div class="vertax-backup-page">' +
        '<div class="laiso-panel vertax-backup-intro">' +
        '<p>Ваши пластинки хранятся в этом браузере. Если сменить телефон, очистить браузер или переустановить приложение — данные пропадут.</p>' +
        '<p>Резервная копия — это файл с вашей коллекцией. Сохраните его в Telegram себе, в заметки, в iCloud или Google Drive.</p>' +
        '<p>Каждая копия содержит всю коллекцию целиком. Делайте новую копию после каждого пополнения.</p>' +
        '</div>' +
        onboardingHtml() +
        backupStatusHtml() +
        restoreChoiceHtml() +
        '<div class="laiso-stack" style="margin-top:14px;">' +
        '<button class="laiso-btn laiso-btn-block" data-action="backup-download">Сохранить копию коллекции</button>' +
        '<button class="laiso-btn laiso-btn-secondary laiso-btn-block" data-action="backup-restore-pick">Восстановить из файла</button>' +
        '</div>' +
        '</div>' +
        renderFooter();
    }
    async function buildBackupBundle(){
      var vinyls = [];
      var sets = [];
      var settings = [];
      try {
        vinyls = await dbGetAll(storeVinyls());
        sets = await dbGetAll(storeSets());
        settings = await dbGetAll(storeSettings());
      } catch(e) {
        toast('Не удалось создать резервную копию');
        return null;
      }
      var now = Date.now();
      var data = {
        app: 'VERTAX-01 / RUNT-01',
        backupVersion: 1,
        createdAt: now,
        vinylCount: (vinyls || []).length,
        vinyls: vinyls || [],
        sets: sets || [],
        settings: settings || []
      };
      var filename = 'vertax-backup-' + formatFileStamp(now) + '.json';
      var text = JSON.stringify(data, null, 2);
      var blob = new Blob([text], {type: 'application/octet-stream'});
      var file = null;
      try { file = new File([text], filename, {type: 'application/json'}); } catch(_) {}
      return { data:data, filename:filename, blob:blob, file:file };
    }
    async function saveBackupMeta(bundle){
      if (!bundle || !bundle.data) return;
      await putSetting('lastBackupAt', bundle.data.createdAt);
      await putSetting('lastBackupVinylCount', bundle.data.vinylCount);
      state.ui.backupRestoreData = null;
      renderApp();
    }
    function canShareFile(file){
      try {
        return !!(file && navigator.share && navigator.canShare && navigator.canShare({ files:[file] }));
      } catch(_) {
        return false;
      }
    }
    function triggerFileDownload(bundle){
      var url = URL.createObjectURL(bundle.blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = bundle.filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1200);
    }
    async function downloadBackup(){
      var bundle = await buildBackupBundle();
      if (!bundle) return;
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent || '') && canShareFile(bundle.file)) {
        try {
          await navigator.share({
            files: [bundle.file],
            title: 'Резервная копия VERTAX',
            text: 'Сохраните файл в удобное место.'
          });
          await saveBackupMeta(bundle);
          toast('Резервная копия создана');
          return;
        } catch(e) {
          if (e && e.name === 'AbortError') return;
        }
      }
      triggerFileDownload(bundle);
      await saveBackupMeta(bundle);
      toast('Резервная копия создана');
    }
    function validateBackup(data){
      if (!data || data.backupVersion == null) return false;
      if (!Array.isArray(data.vinyls)) return false;
      var appName = String(data.app || '');
      return appName.indexOf('VERTAX') >= 0 || appName.indexOf('RUNT') >= 0;
    }
    function pickRestoreFile(){
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json,application/json';
      input.onchange = function(e){
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var fr = new FileReader();
        fr.onload = function(){
          try {
            var data = JSON.parse(String(fr.result || ''));
            if (!validateBackup(data)) {
              toast('Это не похоже на резервную копию VERTAX');
              return;
            }
            state.ui.backupRestoreData = data;
            renderApp();
          } catch(_) {
            toast('Это не похоже на резервную копию VERTAX');
          }
        };
        fr.readAsText(file);
      };
      input.click();
    }
    async function replaceFromBackup(){
      var data = state.ui && state.ui.backupRestoreData;
      if (!validateBackup(data)) {
        toast('Это не похоже на резервную копию VERTAX');
        return;
      }
      try {
        await dbClear(storeVinyls());
        await dbClear(storeSets());
        for (var i = 0; i < data.vinyls.length; i++) {
          if (data.vinyls[i] && data.vinyls[i].id) await dbPut(storeVinyls(), data.vinyls[i]);
        }
        var backupSets = Array.isArray(data.sets) ? data.sets : [];
        for (var j = 0; j < backupSets.length; j++) {
          if (backupSets[j] && backupSets[j].id) await dbPut(storeSets(), backupSets[j]);
        }
        state.collection = data.vinyls.slice();
        state.sets = backupSets.slice();
        state.vinyls = [];
        state.ui.backupRestoreData = null;
        await putSetting('lastBackupAt', data.createdAt || Date.now());
        await putSetting('lastBackupVinylCount', data.vinyls.length);
        toast('Коллекция восстановлена из резервной копии');
        state.view = 'collection';
        renderApp();
      } catch(e) {
        console.warn('backup replace error', e);
        toast('Не удалось восстановить коллекцию');
      }
    }
    function isDuplicateVinyl(current, candidate){
      for (var i = 0; i < current.length; i++) {
        var v = current[i];
        if (v && candidate && v.discogsId && candidate.discogsId && String(v.discogsId) === String(candidate.discogsId)) return true;
      }
      for (var j = 0; j < current.length; j++) {
        var a = current[j];
        if (a && candidate && norm(a.artist) === norm(candidate.artist) && norm(a.title) === norm(candidate.title) && String(a.year || '') === String(candidate.year || '')) return true;
      }
      for (var k = 0; k < current.length; k++) {
        var b = current[k];
        if (b && candidate && b.id && candidate.id && String(b.id) === String(candidate.id)) return true;
      }
      return false;
    }
    async function mergeFromBackup(){
      var data = state.ui && state.ui.backupRestoreData;
      if (!validateBackup(data)) {
        toast('Это не похоже на резервную копию VERTAX');
        return;
      }
      try {
        var current = await dbGetAll(storeVinyls());
        var currentSets = await dbGetAll(storeSets());
        var added = 0;
        var skipped = 0;
        for (var i = 0; i < data.vinyls.length; i++) {
          var v = data.vinyls[i];
          if (!v || !v.id) continue;
          if (isDuplicateVinyl(current, v)) {
            skipped++;
          } else {
            current.push(v);
            await dbPut(storeVinyls(), v);
            added++;
          }
        }
        var setMap = {};
        (currentSets || []).forEach(function(s){ if (s && s.id) setMap[String(s.id)] = true; });
        var incomingSets = Array.isArray(data.sets) ? data.sets : [];
        for (var j = 0; j < incomingSets.length; j++) {
          var set = incomingSets[j];
          if (!set || !set.id || setMap[String(set.id)]) continue;
          setMap[String(set.id)] = true;
          currentSets.push(set);
          await dbPut(storeSets(), set);
        }
        state.collection = await dbGetAll(storeVinyls());
        state.sets = await dbGetAll(storeSets());
        state.vinyls = [];
        state.ui.backupRestoreData = null;
        toast('Добавлено: ' + added + ' пластинок. Пропущено дублей: ' + skipped + '.');
        state.view = 'collection';
        renderApp();
      } catch(e) {
        console.warn('backup merge error', e);
        toast('Не удалось восстановить коллекцию');
      }
    }
    function cancelRestore(){
      state.ui.backupRestoreData = null;
      renderApp();
    }
    function showBackupHint(){
      if (!state || state.view === 'backup') return;
      var settings = state.ui && state.ui.backupSettings || [];
      var lastAt = settingValue(settings, 'lastBackupAt');
      var lastCount = Number(settingValue(settings, 'lastBackupVinylCount') || 0);
      var current = currentVinylCount();
      var missing = lastAt ? Math.max(0, current - lastCount) : current;
      if (current <= 0 || (lastAt && missing <= 0)) return;
      var msg = !lastAt ? '💾 Сохраните резервную копию коллекции' :
        (missing === 1 ? '💾 1 пластинка без резервной копии' : '💾 ' + missing + ' пластинок без резервной копии');
      var old = document.querySelector('.vertax-backup-toast');
      if (old) old.remove();
      var el = document.createElement('button');
      el.type = 'button';
      el.className = 'laiso-toast vertax-backup-toast';
      el.setAttribute('data-action', 'goto-backup');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function(){ if (el && el.parentNode) el.parentNode.removeChild(el); }, 5200);
    }
    function scheduleBackupHint(){
      clearTimeout(window.__vertaxBackupHintTimer);
      window.__vertaxBackupHintTimer = setTimeout(function(){
        loadSettings().then(showBackupHint);
      }, 3000);
    }

    state.ui = state.ui || {};
    state.ui.__backupKnownCollectionCount = currentVinylCount();
    if (typeof persistVinyl === 'function' && !window.__vertaxBackupPersistWrapped) {
      var originalPersistVinyl = persistVinyl;
      persistVinyl = window.persistVinyl = async function(v){
        var before = state.ui.__backupKnownCollectionCount || 0;
        var result = await originalPersistVinyl.apply(this, arguments);
        var after = currentVinylCount();
        if (after > before && state.view !== 'backup') scheduleBackupHint();
        state.ui.__backupKnownCollectionCount = after;
        return result;
      };
      window.__vertaxBackupPersistWrapped = true;
    }

    if (typeof window.viewHome === 'function' && !window.__vertaxBackupHomeWrapped) {
      var oldHome = window.viewHome;
      window.viewHome = viewHome = function(){
        var html = oldHome();
        var backupBtn = '<button class="laiso-btn laiso-btn-secondary" data-action="goto-backup">🗂 Резервная копия</button>';
        if (html.indexOf('data-action="goto-backup"') >= 0) return html;
        if (html.indexOf('</div><div class="laiso-home-stickers"') >= 0) {
          return html.replace('</div><div class="laiso-home-stickers"', backupBtn + '</div><div class="laiso-home-stickers"');
        }
        return html.replace('</div><div class="laiso-home-metrics"', backupBtn + '</div><div class="laiso-home-metrics"');
      };
      window.__vertaxBackupHomeWrapped = true;
    }
    if (typeof window.viewCollection === 'function' && !window.__vertaxBackupCollectionWrapped) {
      var oldCollection = window.viewCollection;
      window.viewCollection = viewCollection = function(){
        var html = oldCollection();
        if (html.indexOf('data-action="goto-backup"') >= 0) return html;
        var btn = '<button class="laiso-btn laiso-btn-secondary laiso-btn-block" data-action="goto-backup">🗂 Резервная копия</button>';
        var marker = '<button class="laiso-btn laiso-btn-warning laiso-btn-block" data-action="confirm-clear">';
        if (html.indexOf(marker) >= 0) return html.replace(marker, btn + marker);
        return html;
      };
      window.__vertaxBackupCollectionWrapped = true;
    }

    function renderBackupOrBase(baseRender){
      if (state.view === 'backup') {
        var root = document.getElementById('laiso-root');
        if (root) root.innerHTML = viewBackup();
        return;
      }
      return baseRender();
    }
    if (!window.__vertaxBackupRenderWrapped) {
      var oldBuckRender = window.laisoBuck.render;
      window.laisoBuck.render = function(){ return renderBackupOrBase(oldBuckRender); };
      window.__vertaxBackupRenderWrapped = true;
    }
    try {
      if (typeof render === 'function' && !window.__vertaxBackupGlobalRenderWrapped) {
        var oldGlobalRender = render;
        render = function(){ return renderBackupOrBase(oldGlobalRender); };
        window.__vertaxBackupGlobalRenderWrapped = true;
      }
    } catch(_) {}

    var oldBack = handlers && handlers.back;
    on('back', function(){
      if (state.view === 'backup') {
        state.view = 'home';
        renderApp();
        return;
      }
      if (typeof oldBack === 'function') return oldBack.apply(this, arguments);
    });
    on('goto-backup', function(){ openBackup(); });
    on('backup-download', function(){ downloadBackup(); });
    on('backup-restore-pick', function(){ pickRestoreFile(); });
    on('backup-restore-replace', function(){ replaceFromBackup(); });
    on('backup-restore-merge', function(){ mergeFromBackup(); });
    on('backup-restore-cancel', function(){ cancelRestore(); });
    on('backup-onboarding-done', async function(){
      await putSetting('backupOnboardingSeen', true);
      await downloadBackup();
    });

    document.addEventListener('click', function(e){
      var t = e.target && e.target.closest && e.target.closest('.vertax-backup-toast[data-action="goto-backup"]');
      if (!t) return;
      e.preventDefault();
      if (t.parentNode) t.parentNode.removeChild(t);
      openBackup();
    }, true);

    var style = document.createElement('style');
    style.textContent = [
      '#laiso-app .vertax-backup-page p{font-size:14px;line-height:1.55;color:var(--text-secondary,#666158);margin:0 0 10px;}',
      '#laiso-app .vertax-backup-status{display:flex;flex-direction:column;gap:6px;background:#101010;color:var(--accent-lime,#C4F542);border-radius:16px;padding:15px 16px;font-family:var(--font-mono,monospace);box-shadow:inset 0 0 20px rgba(0,0,0,.85);}',
      '#laiso-app .vertax-backup-status strong{font-size:13px;letter-spacing:.04em;}',
      '#laiso-app .vertax-backup-status span{font-size:11px;color:rgba(196,245,66,.72);}',
      '#laiso-app .vertax-backup-warn{margin-top:10px;padding:14px 16px;border-radius:16px;background:#FFF0E8;color:var(--warning,#E66A2C);border:1px solid rgba(230,106,44,.35);font-weight:650;line-height:1.45;}',
      '#laiso-app .vertax-backup-onboarding,.vertax-backup-restore{margin:14px 0;padding:18px;border:1px solid #111;border-radius:20px;background:#FFFDF7;box-shadow:0 14px 40px rgba(20,16,10,.08);}',
      '#laiso-app .vertax-backup-onboarding{background:linear-gradient(180deg,#FBFFF0 0%,#FFFDF7 100%);}',
      '#laiso-app .vertax-backup-lock{font-size:28px;margin-bottom:8px;}',
      '#laiso-app .vertax-backup-onboarding h2{font-size:22px;line-height:1.08;margin:0 0 12px;letter-spacing:-.02em;}',
      '#laiso-app .vertax-backup-onboarding p{font-size:15px;color:#111;}',
      '#laiso-app .vertax-backup-restore{display:flex;flex-direction:column;gap:10px;}',
      '#laiso-app .vertax-backup-restore strong{font-size:17px;}',
      '#laiso-app .vertax-backup-restore span{font-family:var(--font-mono,monospace);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-tertiary,#8A847B);}',
      '.vertax-backup-toast{border:0;cursor:pointer;}'
    ].join('\n');
    document.head.appendChild(style);

    loadSettings().then(function(){ renderApp(); });
    console.log('VERTAX backup patch loaded');
  }

  boot();
})();
</script>
</body>
</html>
